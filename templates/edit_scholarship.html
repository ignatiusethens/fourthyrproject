<div style="text-align: center; margin-bottom: 2rem;">
    <h2>Edit Scholarship</h2>
    <p>Update the scholarship details.</p>
</div>

<div class="form-container">
    <form method="POST" action="/admin/edit_scholarship?id={{id}}">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{name}}" required>
        </div>
        <div class="form-group">
            <label>Provider</label>
            <input type="text" name="provider" value="{{provider}}" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3" required>{{description}}</textarea>
        </div>
        <div class="form-group">
            <label>Eligibility</label>
            <input type="text" name="eligibility_criteria" value="{{eligibility_criteria}}" required>
        </div>
        <div class="form-group">
            <label>Deadline</label>
            <input type="text" name="deadline" value="{{deadline}}" required>
        </div>
        <div class="form-group">
            <label>Link</label>
            <input type="url" name="link" value="{{link}}" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Update Scholarship</button>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="/admin" class="btn-secondary" style="border-color: #333; color: #333; padding: 0.5rem 1rem;">Cancel</a>
        </div>
    </form>
</div>
