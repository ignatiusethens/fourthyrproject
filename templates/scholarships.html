<style>
/* ---- Scholarships Page ---- */
.schol-hero {
  background: linear-gradient(135deg, #0f1115 0%, #1a2a1a 100%);
  color: #fff;
  padding: 3rem 2rem 2.5rem;
  text-align: center;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
}
.schol-hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
.schol-hero p  { color: rgba(255,255,255,0.7); font-size: 1rem; max-width: 560px; margin: 0 auto 1.5rem; }

.schol-search-bar {
  display: flex; gap: 0.75rem; max-width: 600px; margin: 0 auto;
}
.schol-search-bar input {
  flex: 1; padding: 0.75rem 1rem; border: none; border-radius: var(--border-radius);
  font-size: 0.95rem; outline: none;
}
.schol-search-bar button {
  padding: 0.75rem 1.5rem; background: var(--color-green); color: #fff;
  border: none; border-radius: var(--border-radius); font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: var(--transition);
}
.schol-search-bar button:hover { background: #1e7a6e; }

.schol-filters {
  display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; align-items: center;
}
.schol-filters span { font-weight: 600; color: var(--text-muted); font-size: 0.9rem; margin-right: 0.25rem; }
.filter-pill {
  padding: 0.4rem 1rem; border-radius: 999px; border: 1.5px solid #ddd;
  font-size: 0.85rem; font-weight: 500; color: var(--text-main);
  text-decoration: none; transition: var(--transition); background: #fff;
}
.filter-pill:hover, .filter-pill-active {
  background: var(--color-black); color: #fff; border-color: var(--color-black);
}

.schol-results-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1.25rem; color: var(--text-muted); font-size: 0.9rem;
}

.schol-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.schol-card {
  background: #fff; border-radius: var(--border-radius);
  box-shadow: var(--box-shadow); padding: 1.5rem;
  display: flex; flex-direction: column; gap: 0.75rem;
  transition: var(--transition);
}
.schol-card:hover { box-shadow: var(--box-shadow-hover); transform: translateY(-3px); }

.schol-card-header {
  display: flex; justify-content: space-between; align-items: center;
}
.schol-icon { font-size: 1.75rem; }
.schol-category-badge {
  font-size: 0.75rem; font-weight: 600; padding: 0.25rem 0.75rem;
  border-radius: 999px; background: var(--color-gray); color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.schol-title {
  font-size: 1rem; font-weight: 700; color: var(--text-main); line-height: 1.4;
}
.schol-provider {
  font-size: 0.85rem; color: var(--color-green); font-weight: 600;
}
.schol-desc {
  font-size: 0.88rem; color: var(--text-muted); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.schol-meta {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
}
.schol-amount, .schol-deadline {
  font-size: 0.8rem; font-weight: 500; padding: 0.3rem 0.75rem;
  border-radius: 999px; background: var(--color-gray);
}
.schol-amount { color: #2a9d8f; }
.schol-deadline { color: var(--color-red); }
.schol-eligibility {
  font-size: 0.82rem; color: var(--text-muted); border-top: 1px solid #f0f0f0;
  padding-top: 0.75rem; line-height: 1.5;
}
.schol-btn {
  margin-top: auto; text-align: center; padding: 0.65rem 1rem;
  font-size: 0.9rem; text-decoration: none; border-radius: var(--border-radius);
  display: block;
}
.schol-empty {
  grid-column: 1 / -1; text-align: center; padding: 3rem 1rem;
  color: var(--text-muted);
}

@media (max-width: 600px) {
  .schol-hero h1 { font-size: 1.5rem; }
  .schol-search-bar { flex-direction: column; }
  .schol-grid { grid-template-columns: 1fr; }
}
</style>

<div class="schol-hero animate-fade-in">
  <h1>Scholarships &amp; Bursaries</h1>
  <p>Discover funding opportunities for your higher education journey in Kenya — from government bursaries to private scholarships.</p>
  <form method="GET" action="/scholarships" class="schol-search-bar">
    <input type="text" name="q" placeholder="Search by name, provider, or keyword…" value="{{search_query}}" aria-label="Search scholarships">
    <button type="submit">Search</button>
  </form>
</div>

<div class="schol-filters">
  <span>Filter:</span>
  {{filter_pills}}
</div>

<div class="schol-results-bar">
  <span>{{result_count}} funding opportunit{{result_count_plural}} found</span>
  {{clear_link}}
</div>

<div class="schol-grid">
  {{scholarships_list}}
</div>

<script>
// Pluralise helper already handled server-side via template var
</script>
