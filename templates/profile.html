<div class="form-container">
    <h2 class="form-title">My Learner Profile</h2>
    <p style="text-align: center; margin-bottom: 1.5rem;">Enter your KCSE grades to receive customized career and higher education recommendations.</p>
    {{alert}}
    <form method="POST" action="/profile">
        <div class="form-group">
            <label for="math_grade">Mathematics Grade</label>
            <select id="math_grade" name="math_grade" required>
                <option value="{{math_grade}}">{{math_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="english_grade">English Grade</label>
            <select id="english_grade" name="english_grade" required>
                <option value="{{english_grade}}">{{english_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="sciences_grade">Average Sciences Grade (Chemistry/Biology/Physics)</label>
            <select id="sciences_grade" name="sciences_grade" required>
                <option value="{{sciences_grade}}">{{sciences_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="humanities_grade">Average Humanities Grade (History/Geo/CRE)</label>
            <select id="humanities_grade" name="humanities_grade" required>
                <option value="{{humanities_grade}}">{{humanities_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="interests">Preferred Broad Career Path</label>
            <select id="interests" name="interests" required>
                <option value="">Select Path</option>
                <option value="STEM">Science, Technology, Engineering, Mathematics</option>
                <option value="Arts_Sports">Arts & Sports Science</option>
                <option value="Social_Sciences">Social Sciences</option>
            </select>
        </div>

        <div class="form-group">
            <label for="personality">How would you describe your personality?</label>
            <select id="personality" name="personality" required>
                <option value="">Select Personality Type</option>
                <option value="Realistic">Realistic (Practical, hands-on)</option>
                <option value="Investigative">Investigative (Analytical, intellectual)</option>
                <option value="Artistic">Artistic (Creative, original)</option>
                <option value="Social">Social (Helping, supporting others)</option>
                <option value="Enterprising">Enterprising (Leading, persuading)</option>
                <option value="Conventional">Conventional (Detail-oriented, organizing)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="hobby">What is your favorite hobby/activity?</label>
            <select id="hobby" name="hobby" required>
                <option value="">Select Favorite Hobby</option>
                <option value="Building things">Building or fixing things</option>
                <option value="Problem solving">Solving puzzles or logical problems</option>
                <option value="Creating art">Creating art, music, or writing</option>
                <option value="Helping others">Volunteering and helping others</option>
                <option value="Leading">Organizing events or leading teams</option>
                <option value="Organized tasks">Working with data or organizing information</option>
            </select>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">Generate Recommendations</button>
    </form>
</div>
