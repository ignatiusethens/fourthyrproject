<div class="form-container">
    <h2 class="form-title">My Learner Profile</h2>
    <p style="text-align: center; margin-bottom: 1.5rem;">Enter your KCSE grades to receive customized career and higher education recommendations.</p>
    {{alert}}
    <form method="POST" action="/profile">
        <div class="form-group">
            <label for="math_grade">Mathematics Grade</label>
            <select id="math_grade" name="math_grade" required>
                <option value="{{math_grade}}">{{math_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="english_grade">English Grade</label>
            <select id="english_grade" name="english_grade" required>
                <option value="{{english_grade}}">{{english_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="sciences_grade">Average Sciences Grade (Chemistry/Biology/Physics)</label>
            <select id="sciences_grade" name="sciences_grade" required>
                <option value="{{sciences_grade}}">{{sciences_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="humanities_grade">Average Humanities Grade (History/Geo/CRE)</label>
            <select id="humanities_grade" name="humanities_grade" required>
                <option value="{{humanities_grade}}">{{humanities_grade}}</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="D-">D-</option>
                <option value="E">E</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="interests">Primary Area of Interest</label>
            <select id="interests" name="interests" required>
                <option value="{{interests}}">{{interests}}</option>
                <option value="STEM">Science, Technology, Engineering, Mathematics</option>
                <option value="Arts_Sports">Arts & Sports Science</option>
                <option value="Social_Sciences">Social Sciences</option>
            </select>
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">Update Profile</button>
    </form>
</div>
